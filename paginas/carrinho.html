<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Market</title>

    <link rel="shortcut icon" href="/icones/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="../css/style_carrinho.css">

    <script src="../js/carrega_produtos.js" type="module" defer></script>

</head>
<body>
    <!-- main# para id e main. para class -->
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <!-- link para pagina usando imagem  -->
                <a href="../index.html">
                    <img src="../icones/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <!-- ul para menus com submenu -->
                <ul>
                    <li><a href="../index.html" class="lnk_menu"> Home </a></li>
                    <li><a href="../paginas/cadastro.html" class="lnk_menu"> Cadastro </a></li>
                    <li><a href="../paginas/sobre.html" class="lnk_menu"> Sobre </a></li>
                    <li><a href="../paginas/produtos.html" class="lnk_menu"> Produtos </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="../paginas/login.html" class="link_icone"><img src="../icones/login.png" alt=""></a></li>
                    <li><a href="../paginas/carrinho.html" class="link_icone"><img src="../icones/carrinho.png" alt=""></a></li>
                </ul>
            </div>
        </header>

        <div id="carrinho-titulo">
            <h2 class="titulo">Carrinho de Compras</h2>
        </div>

            <section class="carrinho">
                <section id="itens-carrinho">
                    <div class="item">
                    <img src="../imagens/b580.png" alt="Intel B580" class="img-item">
        
                        <p class="descricao">Placa de Vídeo ASRock Intel Arc B580 Challenger 12G OC</p>
        
                        <p class="vlr-unitario">
                            R$ 1.999.90
                        </p>
                        <input type="number" id="quant01" name="quant01" class="input-item" value="1" placeholder="Quant">
        
                        <p class="tot-item">R$ 3998,80</p>
        
                        <img src="../icones/remover.png" alt="" class="img-remover">
                    </div>
                </section>

                <section id="compra-cep-cont" class="sections">
                <div id="div-cep" class="valor-card">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" required maxlength="8">
                </div>

                <div id="div-valor" class="valor-card">
                    <label for="valor-total">Valor Total</label>
                    <div id="valor-total">
                        R$
                    </div>

                    <label for="valor-frete">Valor Frete</label>
                    <div id="valor-frete">
                    R$
                    </div>
                </div>

                <div id="pagar" class="valor-card">
                    <label for="total-pagar">Total à Pagar</label>
                    <div id="total-pagar">
                        R$
                    </div>
                </div>

                <button type="button" id="btn-cont" class="btn-val">Continuar Compra</button>
                <button type="button" id="btn-fin" class="btn-val">Finalizar Compra</button>
                </section>
            </section>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua sei la das quantas, 1001 - Centro</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones-sociais">
                <ul>
                    <li><a href="https://wwww.instagram.com/seu_usuario"><img src="../icones/instagram.png" alt=""></a></li>
                    <li><a href="https://wwww.facebook.com/seu_usuario"><img src="../icones/facebook.png" alt=""></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../icones/hipercard.png" alt="Hipercard">
                <img src="../icones/visa.png" alt="Visa">
                <img src="../icones/master_card.png" alt="Mastercard">
            </div>
        </footer>

    </main>
    
</body>
</html>
