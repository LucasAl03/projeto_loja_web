<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Market</title>

    <link rel="shortcut icon" href="../icones/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">

    <link rel="stylesheet" href="../css/style_formulario.css">
</head>
<body>
    <!-- main# para id e main. para class -->
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <!-- link para pagina usando imagem  -->
                <a href="../index.html">
                    <img src="../icones/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <!-- ul para menus com submenu -->
                <ul>
                    <li><a href="../index.html" class="lnk_menu"> Home </a></li>
                    <li><a href="../paginas/cadastro.html" class="lnk_menu"> Cadastro </a></li>
                    <li><a href="../paginas/sobre.html" class="lnk_menu"> Sobre </a></li>
                    <li><a href="../paginas/produtos.html" class="lnk_menu"> Produtos </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="../paginas/login.html" class="link_icone"><img src="../icones/login.png" alt=""></a></li>
                    <li><a href="../paginas/carrinho.html" class="link_icone"><img src="../icones/carrinho.png" alt=""></a></li>
                </ul>
            </div>
        </header>

        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto">
        </section>

        <section id="formulario">
            <h3>Cadastro</h3>

            <form id="form-pessoa">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" class="input01" required maxlength="60" placeholder="Digite seu nome">

                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" class="input01" required maxlength="11" placeholder="Digite seu nome">

                <label for="data-nascimento">Data de Nascimento</label>
                <input type="date" id="data-nascimento" name="data-nascimento" class="input02" required>

                <label for="sexo">Sexo</label>
                <input type="radio" name="sexo" id="sexoM" class="inputOP" value="M">Masculino
                <input type="radio" name="sexo" id="sexoF" class="inputOP" value="M">Feminino
                <input type="radio" name="sexo" id="sexoN" class="inputOP" value="N">Não Declarar

                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" class="input02" required maxlength="9" placeholder="Digite seu CEP">

                <div id="div-dados-endereco" class="oculto">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" name="logradouro" id="logradouro" class="input01">

                    <label for="num-residencia">Número</label>
                    <input type="text" name="num-residencia" id="num-residencia" class="input02" maxlength="10" placeholder="Digite o número da residência" required>

                    <label for="complemento-end">Complemento</label>
                    <input type="text" name="complemento-end" id="complemento-end" class="input01" maxlength="100" placeholder="Digite o complemento">

                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" class="input01">

                    <label for="localidade">Localidade</label>
                    <input type="text" name="localidade" id="localidade" class="input01">

                    <label for="uf">Unidade Federativa</label>
                    <input type="text" name="uf" id="uf" class="input02">

                </div>

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6" placeholder="Informe sua senha">
                
                <div id="div-btns">
                    <button type="submit" id="btn-add">Cadastrar</button>
                    <button type="reset" id="btn-limpar">Limpar</button>   
                </div>
                
            </form>
        </section>
        

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua sei la das quantas, 1001 - Centro</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones-sociais">
                <ul>
                    <li><a href="https://wwww.instagram.com/seu_usuario"><img src="../icones/instagram.png" alt=""></a></li>
                    <li><a href="https://wwww.facebook.com/seu_usuario"><img src="../icones/facebook.png" alt=""></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../icones/hipercard.png" alt="Hipercard">
                <img src="../icones/visa.png" alt="Visa">
                <img src="../icones/master_card.png" alt="Mastercard">
            </div>
        </footer>

    </main>
</body>
</html>
